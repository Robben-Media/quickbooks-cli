version: 2

project_name: quickbooks-cli

changelog:
  disable: true

builds:
  - id: quickbooks
    main: ./cmd/quickbooks
    binary: quickbooks-cli
    ldflags: >-
      -s -w
      -X github.com/builtbyrobben/quickbooks-cli/internal/cmd.version={{ .Tag }}
      -X github.com/builtbyrobben/quickbooks-cli/internal/cmd.commit={{ .ShortCommit }}
      -X github.com/builtbyrobben/quickbooks-cli/internal/cmd.date={{ .Date }}
    env:
      - CGO_ENABLED=0
    targets:
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: quickbooks_darwin
    main: ./cmd/quickbooks
    binary: quickbooks-cli
    ldflags: >-
      -s -w
      -X github.com/builtbyrobben/quickbooks-cli/internal/cmd.version={{ .Tag }}
      -X github.com/builtbyrobben/quickbooks-cli/internal/cmd.commit={{ .ShortCommit }}
      -X github.com/builtbyrobben/quickbooks-cli/internal/cmd.date={{ .Date }}
    env:
      - CGO_ENABLED=1
    targets:
      - darwin_amd64
      - darwin_arm64

archives:
  - ids:
      - quickbooks
      - quickbooks_darwin
    formats: ["tar.gz"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: checksums.txt
